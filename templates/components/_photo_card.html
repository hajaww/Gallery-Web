<!-- templates/components/_photo_card.html -->
<!-- Cinematic Photo Modal -->
<div
  id="photoModal"
  class="fixed inset-0 z-50 hidden"
  onclick="closeModal(event)"
>
  <!-- Backdrop with blur -->
  <div class="absolute inset-0 bg-dark-950/95 backdrop-blur-xl"></div>

  <!-- Modal Container -->
  <div
    class="relative w-full h-full flex items-center justify-center p-4 md:p-8"
    onclick="event.stopPropagation()"
  >
    <div
      class="relative max-w-7xl w-full max-h-full flex flex-col lg:flex-row gap-6 overflow-hidden"
    >
      <!-- Close Button -->
      <button
        onclick="closeModal()"
        class="absolute top-4 right-4 z-20 w-12 h-12 glass rounded-full flex items-center justify-center hover:bg-white/20 transition-all border border-gray-600/30 group"
      >
        <span
          class="material-icons-round text-gray-300 group-hover:text-white transition-colors text-2xl"
          >close</span
        >
      </button>

      <!-- Image Section - Takes more space -->
      <div
        class="flex-1 flex items-center justify-center bg-dark-950 rounded-2xl overflow-hidden"
      >
        <img
          id="modalImage"
          src=""
          alt=""
          class="max-h-[85vh] w-full object-contain"
        />
      </div>

      <!-- Details Sidebar -->
      <div
        class="lg:w-96 glass rounded-2xl p-6 border border-gray-700/30 overflow-y-auto max-h-[85vh]"
      >
        <!-- Title -->
        <h2
          id="modalTitle"
          class="text-3xl font-black text-white mb-6 leading-tight"
        ></h2>

        <!-- Photographer Info -->
        <div
          class="flex items-center space-x-4 mb-8 pb-6 border-b border-gray-700/30"
        >
          <div
            class="w-14 h-14 bg-gradient-to-br from-primary-500 to-accent-500 rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg"
            id="modalAvatar"
          ></div>
          <div>
            <p id="modalUsername" class="font-bold text-white text-lg"></p>
            <p class="text-sm text-gray-400 flex items-center gap-1 mt-1">
              <span class="material-icons-round text-sm">verified</span>
              Fotografer
            </p>
          </div>
        </div>

        <!-- Description -->
        <div class="mb-8">
          <h3
            class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-widest flex items-center gap-2"
          >
            <span class="material-icons-round text-sm">description</span>
            Deskripsi
          </h3>
          <p
            id="modalDescription"
            class="text-gray-300 leading-relaxed text-sm"
          ></p>
        </div>

        <!-- Action Buttons -->
        <div class="space-y-3 mb-6">
          <!-- Like Button -->
          <button
            id="modalLikeBtn"
            onclick="likePhotoFromModal(event)"
            class="w-full flex items-center justify-center space-x-2 px-6 py-4 bg-gradient-to-r from-red-500/10 to-red-600/10 border border-red-500/30 text-red-400 rounded-xl hover:from-red-500/20 hover:to-red-600/20 hover:border-red-500/50 transition-all font-semibold"
          >
            <span class="material-icons-round text-xl">favorite</span>
            <span id="modalLikeCount" class="text-lg"></span>
            <span class="text-sm text-gray-400">Likes</span>
          </button>

          <!-- Share & Download Row -->
          <div class="grid grid-cols-2 gap-3">
            <button
              id="modalShareBtn"
              class="flex items-center justify-center space-x-2 px-4 py-4 glass border border-gray-600/30 text-gray-300 rounded-xl hover:bg-white/10 hover:border-primary-500/50 transition-all font-medium"
            >
              <span class="material-icons-round text-lg">share</span>
              <span>Share</span>
            </button>

            <button
              id="modalDownloadBtn"
              class="flex items-center justify-center space-x-2 px-4 py-4 bg-gradient-to-r from-primary-600 to-primary-700 text-white rounded-xl hover:from-primary-500 hover:to-primary-600 transition-all font-semibold shadow-lg shadow-primary-500/30"
            >
              <span class="material-icons-round text-lg">download</span>
              <span>Download</span>
            </button>
          </div>
        </div>

        <!-- Photo Info -->
        <div class="pt-6 border-t border-gray-700/30">
          <div class="flex items-center justify-between text-xs text-gray-400">
            <span class="flex items-center gap-1">
              <span class="material-icons-round text-sm">calendar_today</span>
              Diupload recently
            </span>
            <span class="flex items-center gap-1">
              <span class="material-icons-round text-sm">visibility</span>
              Publik
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Fungsi Share
  function handleShare() {
    const photoId = window.currentPhotoId;
    const photoTitle =
      window.currentPhotoTitle ||
      document.getElementById("modalTitle").textContent;

    if (!photoId) {
      showNotification("Terjadi kesalahan, silakan refresh halaman", "error");
      return;
    }

    const shareUrl = window.location.origin + "/photo/" + photoId;

    if (navigator.share) {
      navigator
        .share({
          title: photoTitle,
          text: "Lihat foto menarik ini di Lensa!",
          url: shareUrl,
        })
        .then(() => {
          showNotification("Berhasil dibagikan!", "success");
        })
        .catch((error) => {
          if (error.name !== "AbortError") {
            copyToClipboard(shareUrl);
          }
        });
    } else {
      copyToClipboard(shareUrl);
    }
  }

  // Fungsi Download
  function handleDownload() {
    const photoId = window.currentPhotoId;

    if (!photoId) {
      showNotification("Terjadi kesalahan, silakan refresh halaman", "error");
      return;
    }

    showNotification("Mengunduh foto...", "info");
    window.location.href = "/download/" + photoId;
  }

  // Helper functions
  function copyToClipboard(text) {
    navigator.clipboard
      .writeText(text)
      .then(() => {
        showNotification("Link berhasil disalin ke clipboard!", "success");
      })
      .catch((err) => {
        fallbackCopyToClipboard(text);
      });
  }

  function fallbackCopyToClipboard(text) {
    const tempInput = document.createElement("input");
    tempInput.value = text;
    tempInput.style.position = "fixed";
    tempInput.style.opacity = "0";
    document.body.appendChild(tempInput);
    tempInput.select();
    try {
      document.execCommand("copy");
      showNotification("Link berhasil disalin ke clipboard!", "success");
    } catch (err) {
      showNotification("Gagal menyalin link", "error");
    }
    document.body.removeChild(tempInput);
  }

  function showNotification(message, type = "info") {
    const existingNotification = document.querySelector(".custom-notification");
    if (existingNotification) {
      existingNotification.remove();
    }

    const notification = document.createElement("div");
    notification.className = `custom-notification fixed top-4 right-4 z-[60] glass px-6 py-4 rounded-xl border flex items-center space-x-3 animate-fade-in ${
      type === "success"
        ? "border-emerald-500/30 text-emerald-300"
        : type === "error"
          ? "border-red-500/30 text-red-300"
          : "border-primary-500/30 text-primary-300"
    }`;

    const iconMap = {
      success: "check_circle",
      error: "error",
      info: "info",
    };

    notification.innerHTML = `
      <span class="material-icons-round text-xl">${iconMap[type] || iconMap.info}</span>
      <span class="font-medium text-sm">${message}</span>
      <button onclick="this.parentElement.remove()" class="ml-auto hover:opacity-70 transition">
        <span class="material-icons-round text-lg">close</span>
      </button>
    `;

    document.body.appendChild(notification);

    setTimeout(() => {
      if (notification.parentElement) {
        notification.style.opacity = "0";
        notification.style.transition = "opacity 0.3s";
        setTimeout(() => notification.remove(), 300);
      }
    }, 3000);
  }

  // Setup event listeners
  document.addEventListener("DOMContentLoaded", function () {
    const shareBtn = document.getElementById("modalShareBtn");
    if (shareBtn) {
      shareBtn.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        handleShare();
      });
    }

    const downloadBtn = document.getElementById("modalDownloadBtn");
    if (downloadBtn) {
      downloadBtn.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        handleDownload();
      });
    }
  });
</script>

<style>
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(-10px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes modalSlideIn {
    from {
      opacity: 0;
      transform: scale(0.9);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  .animate-fade-in {
    animation: fadeIn 0.3s ease-out;
  }

  #photoModal {
    transition:
      opacity 0.4s ease,
      visibility 0.4s ease;
  }

  #photoModal.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  #photoModal:not(.hidden) {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  #photoModal:not(.hidden) > div > div {
    animation: modalSlideIn 0.4s ease-out;
  }
</style>

<!-- Scroll to Top Button -->
<button
  id="scrollTopBtn"
  onclick="scrollToTop()"
  class="fixed bottom-8 right-8 z-40 w-14 h-14 bg-gradient-to-r from-primary-600 to-primary-700 text-white rounded-full shadow-2xl shadow-primary-500/40 hover:from-primary-500 hover:to-primary-600 transition-all duration-300 opacity-0 translate-y-10 pointer-events-none flex items-center justify-center"
  aria-label="Scroll to top"
>
  <span class="material-icons-round text-2xl">arrow_upward</span>
</button>

<script>
  function scrollToTop() {
    window.scrollTo({
      top: 0,
      behavior: "smooth",
    });
  }

  window.addEventListener("scroll", function () {
    const scrollBtn = document.getElementById("scrollTopBtn");
    if (scrollBtn) {
      if (window.scrollY > 300) {
        scrollBtn.classList.remove(
          "opacity-0",
          "translate-y-10",
          "pointer-events-none",
        );
        scrollBtn.classList.add(
          "opacity-100",
          "translate-y-0",
          "pointer-events-auto",
        );
      } else {
        scrollBtn.classList.add(
          "opacity-0",
          "translate-y-10",
          "pointer-events-none",
        );
        scrollBtn.classList.remove(
          "opacity-100",
          "translate-y-0",
          "pointer-events-auto",
        );
      }
    }
  });
</script>
