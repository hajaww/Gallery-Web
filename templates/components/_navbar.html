<!-- templates/components/_navbar.html -->
<nav
  class="bg-white dark:bg-dark-800 shadow-sm sticky top-0 z-50 transition-colors duration-300"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a href="{{ url_for('index') }}" class="flex items-center space-x-2">
          <span class="material-icons-round text-blue-600 dark:text-blue-400"
            >photo_camera</span
          >
          <span class="text-xl font-bold text-gray-900 dark:text-white"
            >Lensa</span
          >
        </a>
      </div>

      <!-- Center Navigation (Desktop) - ACTIVE STATE FIXED -->
      <div class="hidden md:flex items-center space-x-8">
        <!-- Explore - Active jika di index -->
        <a
          href="{{ url_for('index') }}"
          class="font-medium pb-1 transition {{ 'text-blue-600 dark:text-blue-400 border-b-2 border-blue-600' if request.endpoint == 'index' else 'text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white' }}"
        >
          Explore
        </a>

        <!-- Upload - Active jika di upload -->
        <a
          href="{{ url_for('upload') }}"
          class="font-medium pb-1 transition {{ 'text-blue-600 dark:text-blue-400 border-b-2 border-blue-600' if request.endpoint == 'upload' else 'text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white' }}"
        >
          Upload
        </a>

        <!-- Foto Saya - Active jika di my_photos atau edit_photo -->
        <a
          href="{{ url_for('my_photos') }}"
          class="font-medium pb-1 transition {{ 'text-blue-600 dark:text-blue-400 border-b-2 border-blue-600' if request.endpoint in ['my_photos', 'edit_photo'] else 'text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white' }}"
        >
          Foto Saya
        </a>
      </div>

      <!-- Right Menu -->
      <div class="flex items-center space-x-4">
        <!-- Dark Mode Toggle -->
        <button
          onclick="toggleDarkMode()"
          class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-dark-700 transition focus:outline-none"
          aria-label="Toggle Dark Mode"
        >
          <span
            id="darkModeIcon"
            class="material-icons-round text-gray-600 dark:text-gray-300"
            >dark_mode</span
          >
        </button>

        {% if current_user.is_authenticated %}
        <!-- Profile Dropdown -->
        <div class="relative">
          <button
            onclick="toggleDropdown()"
            class="flex items-center space-x-2 focus:outline-none"
          >
            <div
              class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-semibold"
            >
              {{ current_user.name[0].upper() }}
            </div>
            <span
              class="material-icons-round text-sm text-gray-600 dark:text-gray-300"
              >expand_more</span
            >
          </button>

          <div
            id="profileDropdown"
            class="absolute right-0 mt-2 w-48 bg-white dark:bg-dark-700 rounded-md shadow-lg py-1 hidden border border-gray-200 dark:border-dark-600 z-50"
          >
            <a
              href="{{ url_for('edit_profile') }}"
              class="block px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-dark-600 flex items-center space-x-2 {{ 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-dark-600' if request.endpoint == 'edit_profile' else 'text-gray-700 dark:text-gray-300' }}"
            >
              <span class="material-icons-round text-sm">edit</span>
              <span>Edit Profil</span>
            </a>
            <a
              href="{{ url_for('my_photos') }}"
              class="block px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-dark-600 flex items-center space-x-2 md:hidden {{ 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-dark-600' if request.endpoint in ['my_photos', 'edit_photo'] else 'text-gray-700 dark:text-gray-300' }}"
            >
              <span class="material-icons-round text-sm">photo_library</span>
              <span>Foto Saya</span>
            </a>
            <hr class="my-1 border-gray-200 dark:border-dark-600" />
            <a
              href="{{ url_for('logout') }}"
              class="block px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center space-x-2"
            >
              <span class="material-icons-round text-sm">logout</span>
              <span>Logout</span>
            </a>
          </div>
        </div>
        {% else %}
        <!-- Login - Active jika di login -->
        <a
          href="{{ url_for('login') }}"
          class="font-medium {{ 'text-blue-600 dark:text-blue-400' if request.endpoint == 'login' else 'text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white' }}"
        >
          Sign In
        </a>
        <!-- Register - Active jika di register -->
        <a
          href="{{ url_for('register') }}"
          class="bg-blue-600 text-white px-5 py-2.5 rounded-full hover:bg-blue-700 font-medium transition {{ 'ring-2 ring-blue-300 ring-offset-2 dark:ring-offset-dark-800' if request.endpoint == 'register' else '' }}"
        >
          Register
        </a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>

<script>
  // Dark Mode Toggle
  function toggleDarkMode() {
    const html = document.documentElement;
    const icon = document.getElementById("darkModeIcon");

    if (html.classList.contains("dark")) {
      html.classList.remove("dark");
      html.classList.add("light");
      icon.textContent = "dark_mode";
      localStorage.setItem("theme", "light");
    } else {
      html.classList.remove("light");
      html.classList.add("dark");
      icon.textContent = "light_mode";
      localStorage.setItem("theme", "dark");
    }
  }

  // Initialize Dark Mode from localStorage or system preference
  (function () {
    const html = document.documentElement;
    const icon = document.getElementById("darkModeIcon");
    const savedTheme = localStorage.getItem("theme");

    if (
      savedTheme === "dark" ||
      (!savedTheme && window.matchMedia("(prefers-color-scheme: dark)").matches)
    ) {
      html.classList.remove("light");
      html.classList.add("dark");
      if (icon) icon.textContent = "light_mode";
    } else {
      html.classList.remove("dark");
      html.classList.add("light");
      if (icon) icon.textContent = "dark_mode";
    }
  })();

  // Profile Dropdown Toggle
  function toggleDropdown() {
    const dropdown = document.getElementById("profileDropdown");
    dropdown.classList.toggle("hidden");
  }

  document.addEventListener("click", function (event) {
    const dropdown = document.getElementById("profileDropdown");
    const button = event.target.closest("button");

    if (dropdown && !dropdown.contains(event.target) && !button) {
      dropdown.classList.add("hidden");
    }
  });

  // Smooth Navigation Handler
  // Intercept internal links dan tambahkan smooth transition
  document.addEventListener("DOMContentLoaded", function () {
    const internalLinks = document.querySelectorAll('a[href^="/"]');

    internalLinks.forEach((link) => {
      link.addEventListener("click", function (e) {
        const href = this.getAttribute("href");

        // Skip jika link punya modifier keys atau target blank
        if (e.ctrlKey || e.metaKey || e.shiftKey || this.target === "_blank") {
          return;
        }

        // Skip jika href khusus
        if (
          href === "#" ||
          href.startsWith("javascript:") ||
          href.includes("?")
        ) {
          return;
        }

        // Tambahkan smooth fade-out effect sebelum navigate
        const body = document.body;
        body.style.transition = "opacity 0.2s ease";
        body.style.opacity = "0.7";

        // Delay sedikit untuk effect visual
        setTimeout(() => {
          window.location.href = href;
        }, 150);

        e.preventDefault();
      });
    });

    // Scroll to top saat halaman baru load
    window.scrollTo({
      top: 0,
      behavior: "instant",
    });
  });
</script>
