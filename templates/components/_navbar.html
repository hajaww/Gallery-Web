<!-- templates/components/_navbar.html -->
<nav class="glass sticky top-0 z-50 border-b border-gray-700/30">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a
          href="{{ url_for('index') }}"
          class="flex items-center space-x-3 group"
        >
          <div class="relative">
            <div
              class="absolute inset-0 bg-primary-500 blur-lg opacity-50 group-hover:opacity-75 transition-opacity"
            ></div>
            <img
              src="{{ url_for('static', filename='lensalogo.png') }}"
              alt="Lensa Logo"
              class="relative w-10 h-10 object-contain"
            />
          </div>
          <span class="text-2xl font-bold text-gradient">Lensa</span>
        </a>
      </div>

      <!-- Center Navigation (Desktop) -->
      <div class="hidden md:flex items-center space-x-2">
        <!-- Explore -->
        <a
          href="{{ url_for('index') }}"
          class="relative px-5 py-2.5 rounded-full font-medium transition-all duration-300 {{ 'bg-primary-500/20 text-primary-300 shadow-lg shadow-primary-500/20' if request.endpoint == 'index' else 'text-gray-300 hover:text-white hover:bg-white/5' }}"
        >
          <span class="flex items-center space-x-2">
            <span class="material-icons-round text-lg">explore</span>
            <span>Explore</span>
          </span>
        </a>

        <!-- Upload -->
        <a
          href="{{ url_for('upload') }}"
          class="relative px-5 py-2.5 rounded-full font-medium transition-all duration-300 {{ 'bg-primary-500/20 text-primary-300 shadow-lg shadow-primary-500/20' if request.endpoint == 'upload' else 'text-gray-300 hover:text-white hover:bg-white/5' }}"
        >
          <span class="flex items-center space-x-2">
            <span class="material-icons-round text-lg">cloud_upload</span>
            <span>Upload</span>
          </span>
        </a>

        <!-- Foto Saya -->
        <a
          href="{{ url_for('my_photos') }}"
          class="relative px-5 py-2.5 rounded-full font-medium transition-all duration-300 {{ 'bg-primary-500/20 text-primary-300 shadow-lg shadow-primary-500/20' if request.endpoint in ['my_photos', 'edit_photo'] else 'text-gray-300 hover:text-white hover:bg-white/5' }}"
        >
          <span class="flex items-center space-x-2">
            <span class="material-icons-round text-lg">photo_library</span>
            <span>Foto Saya</span>
          </span>
        </a>
      </div>

      <!-- Right Menu -->
      <div class="flex items-center space-x-4">
        {% if current_user.is_authenticated %}
        <!-- Profile Dropdown -->
        <div class="relative">
          <button
            onclick="toggleDropdown()"
            class="flex items-center space-x-3 glass px-3 py-2 rounded-full hover:bg-white/10 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-primary-500"
          >
            <div
              class="w-9 h-9 rounded-full overflow-hidden shadow-lg border-2 border-primary-500/50"
            >
              <div
                class="w-full h-full bg-gradient-to-br from-primary-500 to-accent-500 flex items-center justify-center text-white font-bold text-sm"
              >
                {{ current_user.name[0].upper() }}
              </div>
            </div>
            <span class="material-icons-round text-sm text-gray-300"
              >expand_more</span
            >
          </button>

          <div
            id="profileDropdown"
            class="absolute right-0 mt-3 w-56 glass rounded-2xl shadow-2xl py-2 hidden border border-gray-700/50 z-50"
          >
            <div class="px-4 pb-3 mb-2 border-b border-gray-700/30">
              <p class="font-semibold text-white">{{ current_user.name }}</p>
              <p class="text-xs text-gray-400">{{ current_user.email }}</p>
            </div>

            <a
              href="{{ url_for('edit_profile') }}"
              class="px-4 py-2.5 hover:bg-white/5 flex items-center space-x-3 transition-colors {{ 'bg-primary-500/10 text-primary-300' if request.endpoint == 'edit_profile' else 'text-gray-300' }}"
            >
              <span class="material-icons-round text-lg">edit</span>
              <span class="font-medium">Edit Profil</span>
            </a>
            <a
              href="{{ url_for('my_photos') }}"
              class="px-4 py-2.5 hover:bg-white/5 flex items-center space-x-3 transition-colors md:hidden {{ 'bg-primary-500/10 text-primary-300' if request.endpoint in ['my_photos', 'edit_photo'] else 'text-gray-300' }}"
            >
              <span class="material-icons-round text-lg">photo_library</span>
              <span class="font-medium">Foto Saya</span>
            </a>
            <div class="border-t border-gray-700/30 my-2"></div>
            <a
              href="{{ url_for('logout') }}"
              class="px-4 py-2.5 text-red-400 hover:bg-red-500/10 flex items-center space-x-3 transition-colors"
            >
              <span class="material-icons-round text-lg">logout</span>
              <span class="font-medium">Logout</span>
            </a>
          </div>
        </div>
        {% else %}
        <!-- Auth Buttons -->
        <a
          href="{{ url_for('login') }}"
          class="hidden sm:block font-medium text-gray-300 hover:text-white transition-colors px-4 py-2 {{ 'text-primary-300' if request.endpoint == 'login' else '' }}"
        >
          Sign In
        </a>
        <a
          href="{{ url_for('register') }}"
          class="relative bg-gradient-to-r from-primary-600 to-primary-700 text-white px-6 py-2.5 rounded-full font-semibold hover:from-primary-500 hover:to-primary-600 transition-all duration-300 shadow-lg shadow-primary-500/30 hover:shadow-primary-500/50 {{ 'ring-2 ring-primary-300 ring-offset-2 ring-offset-dark-950' if request.endpoint == 'register' else '' }}"
        >
          <span class="flex items-center space-x-2">
            <span class="material-icons-round text-lg">person_add</span>
            <span>Register</span>
          </span>
        </a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>

<script>
  // Profile Dropdown Toggle
  function toggleDropdown() {
    const dropdown = document.getElementById("profileDropdown");
    dropdown.classList.toggle("hidden");
  }

  document.addEventListener("click", function (event) {
    const dropdown = document.getElementById("profileDropdown");
    const button = event.target.closest("button");

    if (dropdown && !dropdown.contains(event.target) && !button) {
      dropdown.classList.add("hidden");
    }
  });

  // Smooth Navigation Handler
  document.addEventListener("DOMContentLoaded", function () {
    const internalLinks = document.querySelectorAll('a[href^="/"]');

    internalLinks.forEach((link) => {
      link.addEventListener("click", function (e) {
        const href = this.getAttribute("href");

        if (e.ctrlKey || e.metaKey || e.shiftKey || this.target === "_blank") {
          return;
        }

        if (
          href === "#" ||
          href.startsWith("javascript:") ||
          href.includes("?")
        ) {
          return;
        }

        const body = document.body;
        body.style.transition = "opacity 0.2s ease";
        body.style.opacity = "0.7";

        setTimeout(() => {
          window.location.href = href;
        }, 150);

        e.preventDefault();
      });
    });

    window.scrollTo({
      top: 0,
      behavior: "instant",
    });
  });
</script>
