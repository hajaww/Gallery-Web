{% extends "base.html" %} {% block title %}Edit Profil - Lensa{% endblock %} {%
block extra_css %}
<style>
  /* Smooth fade-in untuk edit profile form */
  @keyframes fadeInProfile {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .shadow-xl {
    animation: fadeInProfile 0.5s ease-out backwards;
  }
</style>
{% endblock %} {% block content %}
<div
  class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8"
>
  <div
    class="max-w-md w-full bg-white dark:bg-dark-800 rounded-2xl shadow-xl p-8"
  >
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <div
          class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-3xl"
        >
          {{ current_user.name[0].upper() }}
        </div>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 dark:text-white">
        Edit Profil
      </h2>
      <p class="text-gray-500 dark:text-gray-400 text-sm">
        Update informasi profil Anda
      </p>
    </div>

    <!-- Form -->
    <form
      method="POST"
      action="{{ url_for('edit_profile') }}"
      class="space-y-6"
    >
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div>
        <label
          class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >Nama Lengkap</label
        >
        <div class="relative">
          <span
            class="material-icons-round absolute left-3 top-3 text-gray-400 dark:text-gray-500 text-sm"
            >person</span
          >
          <input
            type="text"
            name="name"
            required
            value="{{ current_user.name }}"
            class="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-dark-600 bg-white dark:bg-dark-700 text-gray-900 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>
      </div>

      <div>
        <label
          class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >Email</label
        >
        <div class="relative">
          <span
            class="material-icons-round absolute left-3 top-3 text-gray-400 dark:text-gray-500 text-sm"
            >mail</span
          >
          <input
            type="email"
            name="email"
            required
            value="{{ current_user.email }}"
            class="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-dark-600 bg-gray-50 dark:bg-dark-700 text-gray-900 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            disabled
          />
        </div>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
          Email tidak dapat diubah
        </p>
      </div>

      <div class="flex space-x-4">
        <a
          href="{{ url_for('my_photos') }}"
          class="flex-1 px-6 py-3 border border-gray-300 dark:border-dark-600 text-gray-700 dark:text-gray-300 rounded-lg font-semibold hover:bg-gray-50 dark:hover:bg-dark-700 text-center"
        >
          Batal
        </a>
        <button
          type="submit"
          class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-lg font-semibold hover:from-blue-700 hover:to-blue-800 transition"
        >
          Simpan Perubahan
        </button>
      </div>
    </form>

    <!-- Back Link -->
    <p class="text-center mt-6">
      <a
        href="{{ url_for('my_photos') }}"
        class="text-blue-600 dark:text-blue-400 font-medium hover:text-blue-800 dark:hover:text-blue-300 text-sm"
      >
        ← Kembali ke Foto Saya
      </a>
    </p>
  </div>
</div>
{% endblock %}
