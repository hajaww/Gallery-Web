{% extends "base.html" %} {% block title %}Edit Profil - Galeri Foto{% endblock
%} {% block content %}
<div
  class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8"
>
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <div
          class="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-3xl"
        >
          {{ current_user.name[0].upper() }}
        </div>
      </div>
      <h2 class="text-2xl font-bold text-gray-900">Edit Profil</h2>
      <p class="text-gray-500 text-sm">Update informasi profil Anda</p>
    </div>

    <!-- Form -->
    <form
      method="POST"
      action="{{ url_for('edit_profile') }}"
      class="space-y-6"
    >
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2"
          >Nama Lengkap</label
        >
        <div class="relative">
          <span
            class="material-icons-round absolute left-3 top-3 text-gray-400 text-sm"
            >person</span
          >
          <input
            type="text"
            name="name"
            required
            value="{{ current_user.name }}"
            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2"
          >Email</label
        >
        <div class="relative">
          <span
            class="material-icons-round absolute left-3 top-3 text-gray-400 text-sm"
            >mail</span
          >
          <input
            type="email"
            name="email"
            required
            value="{{ current_user.email }}"
            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-gray-50"
            disabled
          />
        </div>
        <p class="text-xs text-gray-500 mt-1">Email tidak dapat diubah</p>
      </div>

      <div class="flex space-x-4">
        <a
          href="{{ url_for('my_photos') }}"
          class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 rounded-lg font-semibold hover:bg-gray-50 text-center"
        >
          Batal
        </a>
        <button
          type="submit"
          class="flex-1 px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg font-semibold hover:from-indigo-700 hover:to-purple-700 transition"
        >
          Simpan Perubahan
        </button>
      </div>
    </form>

    <!-- Back Link -->
    <p class="text-center mt-6">
      <a
        href="{{ url_for('my_photos') }}"
        class="text-indigo-600 font-medium hover:text-indigo-800 text-sm"
      >
        ← Kembali ke Foto Saya
      </a>
    </p>
  </div>
</div>
{% endblock %}
