{% extends "base.html" %} {% block title %}Masuk - Lensa{% endblock %} {% block
extra_css %}
<style>
  /* Smooth fade-in untuk login form */
  @keyframes fadeInLogin {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .shadow-xl {
    animation: fadeInLogin 0.5s ease-out backwards;
  }
</style>
{% endblock %} {% block content %}
<div
  class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8"
>
  <div
    class="max-w-md w-full bg-white dark:bg-dark-800 rounded-2xl shadow-xl p-8"
  >
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <span
          class="material-icons-round text-5xl text-blue-600 dark:text-blue-400"
          >photo_camera</span
        >
      </div>
      <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Lensa</h2>
      <p class="text-gray-500 dark:text-gray-400 text-sm">
        The Digital Curator
      </p>
    </div>

    <!-- Form -->
    <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div>
        <label
          class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >Email</label
        >
        <div class="relative">
          <span
            class="material-icons-round absolute left-3 top-3 text-gray-400 dark:text-gray-500 text-sm"
            >mail</span
          >
          <input
            type="email"
            name="email"
            required
            class="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-dark-600 bg-white dark:bg-dark-700 text-gray-900 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="nama@email.com"
          />
        </div>
      </div>

      <div>
        <label
          class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >Password</label
        >
        <div class="relative">
          <span
            class="material-icons-round absolute left-3 top-3 text-gray-400 dark:text-gray-500 text-sm"
            >lock</span
          >
          <input
            type="password"
            name="password"
            required
            class="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-dark-600 bg-white dark:bg-dark-700 text-gray-900 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="••••••••"
          />
        </div>
      </div>

      <div class="flex items-center justify-between">
        <label class="flex items-center">
          <input
            type="checkbox"
            name="remember"
            class="w-4 h-4 text-blue-600 border-gray-300 dark:border-dark-600 rounded focus:ring-blue-500"
          />
          <span class="ml-2 text-sm text-gray-600 dark:text-gray-400"
            >Remember Me</span
          >
        </label>
      </div>

      <button
        type="submit"
        class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-blue-800 transition"
      >
        Masuk
      </button>
    </form>

    <!-- Register Link -->
    <p class="text-center mt-6 text-gray-600 dark:text-gray-400">
      Belum punya akun?
      <a
        href="{{ url_for('register') }}"
        class="text-blue-600 dark:text-blue-400 font-semibold hover:text-blue-800 dark:hover:text-blue-300"
        >Daftar</a
      >
    </p>
  </div>
</div>
{% endblock %}
