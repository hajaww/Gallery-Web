{% extends "base.html" %} {% block title %}Masuk - Galeri Foto{% endblock %} {%
block content %}
<div
  class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8"
>
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <span class="material-icons-round text-5xl text-indigo-600"
          >photo_camera</span
        >
      </div>
      <h2 class="text-2xl font-bold text-gray-800">Galeri Foto</h2>
      <p class="text-gray-500 text-sm">The Digital Curator</p>
    </div>

    <!-- Form -->
    <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2"
          >Email</label
        >
        <div class="relative">
          <span
            class="material-icons-round absolute left-3 top-3 text-gray-400 text-sm"
            >mail</span
          >
          <input
            type="email"
            name="email"
            required
            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            placeholder="nama@email.com"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2"
          >Password</label
        >
        <div class="relative">
          <span
            class="material-icons-round absolute left-3 top-3 text-gray-400 text-sm"
            >lock</span
          >
          <input
            type="password"
            name="password"
            required
            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            placeholder="••••••••"
          />
        </div>
      </div>

      <div class="flex items-center justify-between">
        <label class="flex items-center">
          <input
            type="checkbox"
            name="remember"
            class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500"
          />
          <span class="ml-2 text-sm text-gray-600">Remember Me</span>
        </label>
      </div>

      <button
        type="submit"
        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:from-indigo-700 hover:to-purple-700 transition"
      >
        Masuk
      </button>
    </form>

    <!-- Register Link -->
    <p class="text-center mt-6 text-gray-600">
      Belum punya akun?
      <a
        href="{{ url_for('register') }}"
        class="text-indigo-600 font-semibold hover:text-indigo-800"
        >Daftar</a
      >
    </p>
  </div>
</div>
{% endblock %}
